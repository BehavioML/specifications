description: |
  The resource server validates the presented token or authorization context and returns the protected resource.

roles:
  primary: resource_server
  participants:
    - client
    - authorization_server

triggered_by:
  - protected_resource_requested

steps:
  - from: resource_server
    capability: oauth/validate_access_token
    label: Validate access token
  - from: resource_server
    to: client
    capability: oauth/return_protected_resource
    label: Return protected resource
