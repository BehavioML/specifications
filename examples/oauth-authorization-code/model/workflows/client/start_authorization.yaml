description: |
  The client starts the authorization code flow and sends the resource owner through the user agent to the authorization server.

roles:
  primary: client
  participants:
    - resource_owner
    - user_agent
    - authorization_server

steps:
  - from: client
    capability: oauth/build_authorization_request
    label: Build authorization request
  - from: client
    to: user_agent
    capability: oauth/redirect_to_authorization_server
    label: Redirect to authorization server
