description: |
  After the authorization callback delivers the code, the client exchanges it for tokens at the token endpoint and receives the token response.

roles:
  primary: client
  participants:
    - authorization_server

triggered_by:
  - authorization_code_issued

steps:
  - from: client
    to: authorization_server
    capability: oauth/exchange_code_for_tokens
    label: Token request
  - from: authorization_server
    to: client
    capability: oauth/return_token_response
    label: Token response
