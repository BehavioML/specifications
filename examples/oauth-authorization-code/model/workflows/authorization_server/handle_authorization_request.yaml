description: |
  The authorization server receives the authorization request, identifies the resource owner, validates client redirect context, and obtains or validates consent.

roles:
  primary: authorization_server
  participants:
    - resource_owner
    - client
    - user_agent

triggered_by:
  - authorization_requested

steps:
  - from: user_agent
    to: authorization_server
    capability: oauth/receive_authorization_request
    label: Authorization request
  - from: authorization_server
    to: resource_owner
    capability: oauth/authenticate_resource_owner
    label: Authenticate resource owner
  - from: authorization_server
    capability: oauth/validate_redirect_uri
    label: Validate redirect URI
  - from: authorization_server
    to: resource_owner
    capability: oauth/obtain_consent
    label: Obtain consent
