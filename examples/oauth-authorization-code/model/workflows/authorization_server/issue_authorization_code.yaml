description: |
  The authorization server issues an authorization code after consent and redirects the user agent back to the client.

roles:
  primary: authorization_server
  participants:
    - client
    - resource_owner
    - user_agent

triggered_by:
  - consent_granted

steps:
  - from: authorization_server
    capability: oauth/issue_authorization_code
    label: Issue authorization code
  - from: authorization_server
    to: user_agent
    capability: oauth/redirect_with_authorization_code
    label: Redirect with authorization code
  - from: user_agent
    to: client
    capability: oauth/deliver_authorization_callback
    label: Authorization callback
