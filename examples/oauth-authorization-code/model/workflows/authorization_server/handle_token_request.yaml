description: |
  The authorization server handles a token request and returns the token endpoint response.

roles:
  primary: authorization_server
  participants:
    - client

triggered_by:
  - token_request_received

steps:
  - from: client
    to: authorization_server
    capability: oauth/receive_token_request
    label: Token request
  - from: authorization_server
    to: client
    capability: oauth/return_token_response
    label: Token response
