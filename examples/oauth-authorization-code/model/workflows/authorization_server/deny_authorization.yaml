description: |
  The authorization server handles a denied consent outcome by rejecting the authorization request and redirecting the user agent back to the client with a denied outcome.

roles:
  primary: authorization_server
  participants:
    - resource_owner
    - client
    - user_agent

triggered_by:
  - consent_denied

steps:
  - from: authorization_server
    capability: oauth/reject_authorization_request
    label: Reject authorization request
  - from: authorization_server
    to: user_agent
    capability: oauth/redirect_with_authorization_denied
    label: Redirect with authorization denied
  - from: user_agent
    to: client
    capability: oauth/deliver_authorization_callback
    label: Authorization denied callback
