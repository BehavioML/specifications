    - whip/return_created_response
    - whip/receive_redirect_response
    - whip/receive_trickle_ice_patch
    - whip/return_trickle_ice_response
    - whip/receive_ice_restart_patch
    - whip/return_ice_restart_answer
    - whip/receive_delete_request
    - whip/return_termination_response
    - whip/return_problem_response
    - whip/return_authorization_error
    - whip/receive_unauthorized_request
