description: |
  Implementation boundary for SDP offer validation, SDP answer generation, and WebRTC session update behavior.

implements:
  capabilities:
    - whip/validate_sdp_offer
    - whip/generate_sdp_answer
    - whip/validate_ice_candidate_fragment
    - whip/apply_remote_ice_candidate
    - whip/validate_ice_restart_offer
    - whip/replace_remote_ice_candidates
    - whip/apply_ice_restart
    - whip/reject_invalid_sdp_offer
  interfaces:
    - webrtc/sdp_answer_generation

belongs_to: webrtc_session
