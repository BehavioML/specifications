description: |
  The WHIP endpoint defers setup during temporary overload instead of creating a WHIP session resource.

roles:
  primary: whip_endpoint
  participants:
    - whip_client

steps:
  - from: whip_client
    to: whip_endpoint
    capability: whip/send_sdp_offer
    label: HTTP POST while endpoint is overloaded
  - from: whip_endpoint
    to: whip_client
    capability: whip/defer_overloaded_setup
    label: Service unavailable response

emits:
  - setup_overload_deferred
