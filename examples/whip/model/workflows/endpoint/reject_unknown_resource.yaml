description: |
  The endpoint rejects a PATCH or DELETE request addressed to an unknown or expired WHIP resource Location.

roles:
  primary: whip_endpoint
  participants:
    - whip_client

steps:
  - from: whip_client
    to: whip_endpoint
    capability: whip/send_unknown_resource_request
    label: Request unknown WHIP resource
  - from: whip_endpoint
    capability: whip/receive_unknown_resource_request
    label: Validate resource Location
  - from: whip_endpoint
    to: whip_client
    capability: whip/return_problem_response
    label: 404 problem response
