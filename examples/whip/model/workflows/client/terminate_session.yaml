description: |
  The client terminates an active WHIP session by deleting the WHIP resource created during session establishment.

roles:
  primary: whip_client
  participants:
    - whip_endpoint

triggered_by:
  - session_established

steps:
  - from: whip_client
    to: whip_endpoint
    capability: whip/send_delete_request
    label: DELETE WHIP resource
  - from: whip_endpoint
    capability: whip/receive_delete_request
    label: Release ingest session and delete resource
  - from: whip_endpoint
    to: whip_client
    capability: whip/return_termination_response
    label: Termination response
