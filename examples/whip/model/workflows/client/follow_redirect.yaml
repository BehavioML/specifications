description: |
  The client handles an HTTP 307 redirect explicitly by repeating the original WHIP request at the redirected endpoint.

roles:
  primary: whip_client
  participants:
    - whip_endpoint

steps:
  - from: whip_client
    to: whip_endpoint
    capability: whip/send_sdp_offer
    label: Original WHIP request
  - from: whip_endpoint
    to: whip_client
    capability: whip/receive_redirect_response
    label: 307 Temporary Redirect
  - from: whip_client
    to: whip_endpoint
    capability: whip/repeat_request_at_redirected_endpoint
    label: Repeat original request at redirected endpoint
