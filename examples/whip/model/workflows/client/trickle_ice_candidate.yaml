description: |
  The client sends a trickle ICE PATCH to the existing WHIP resource and the endpoint accepts it without returning a body.

roles:
  primary: whip_client
  participants:
    - whip_endpoint

triggered_by:
  - session_established

steps:
  - from: whip_client
    to: whip_endpoint
    capability: whip/send_trickle_ice_patch
    label: PATCH trickle ICE candidate
  - from: whip_endpoint
    capability: whip/receive_trickle_ice_patch
    label: Validate resource and apply ICE candidate
  - from: whip_endpoint
    to: whip_client
    capability: whip/return_trickle_ice_response
    label: 204 No Content
