description: |
  The WHIP client receives ICE server configuration advertised by the endpoint in the successful setup response.

roles:
  primary: whip_client
  participants:
    - whip_endpoint

steps:
  - from: whip_endpoint
    capability: whip/include_ice_server_configuration
    label: Include ICE server links in setup response
  - from: whip_endpoint
    to: whip_client
    capability: whip/receive_ice_server_configuration
    label: ICE server configuration received
