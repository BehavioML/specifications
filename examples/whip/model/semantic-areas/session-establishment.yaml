name: Session establishment
description: >-
  Behavior area covering creation of a WHIP session resource from the
  client's initial SDP offer and the endpoint's setup response or setup
  rejection.
workflows:
  - client/create_session
  - endpoint/reject_invalid_offer
notes: >-
  Owns the setup success and invalid-offer rejection workflows. The setup
  workflow is intentionally limited to the WHIP HTTP POST / 201 Created
  exchange; media-plane establishment remains a lifecycle boundary for later
  refinement, not a role interaction in this workflow.
