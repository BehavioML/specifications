name: ICE restart
description: >-
  Behavior area covering PATCH-based ICE restart for an existing WHIP session,
  including new ICE information, entity-tag replacement, candidate-set
  replacement, and failed restart boundaries.
workflows:
  - client/restart_ice
  - session/reject_failed_ice_restart
notes: >-
  Owns successful ICE restart and restart rejection workflows. SDP fragment
  grammar, local retry algorithms, and out-of-order response algorithms remain
  outside the workflow spine.
