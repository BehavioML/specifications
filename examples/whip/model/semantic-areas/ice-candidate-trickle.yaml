name: ICE candidate trickle
description: >-
  Behavior area covering PATCH-based delivery of additional ICE candidates to an
  existing WHIP session resource and the session response semantics for accepted
  or rejected trickle updates.
workflows:
  - client/trickle_ice_candidates
  - session/reject_invalid_ice_patch
notes: >-
  Owns PATCH-based Trickle ICE behavior and invalid PATCH rejection. Silent
  discard of unusable candidates remains local RFC-defined processing, not a
  separate workflow, event, branch, guard, state transition, or failure state.
