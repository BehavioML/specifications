description: |
  Receive the WHIP session-creation POST and establish endpoint-side request context before response preparation.
uses:
  - whip/authorize_request
  - whip/validate_sdp_offer
  - whip/allocate_ingest_session
  - whip/create_whip_resource
  - whip/generate_sdp_answer
  - whip/include_location_header
  - whip/include_ice_server_links
events:
  - session_creation_requested
  - sdp_offer_received
  - authorization_succeeded
