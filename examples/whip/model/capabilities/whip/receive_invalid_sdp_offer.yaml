description: |
  Receive a POST with an invalid SDP offer or unsupported media/session request and reject it before creating a WHIP resource.
uses:
  - whip/authorize_request
  - whip/validate_sdp_offer
  - whip/reject_invalid_sdp_offer
events:
  - session_creation_requested
  - sdp_offer_received
  - invalid_offer_rejected
