description: |
  The client handles a failed QUIC handshake by closing the connection.

roles:
  primary: client
  participants:
    - server

triggered_by:
  - handshake_failed

steps:
  - from: client
    to: server
    capability: connection/send_connection_close
    label: Connection Close
  - from: client
    capability: connection/discard_connection_state
    label: Discard connection state
