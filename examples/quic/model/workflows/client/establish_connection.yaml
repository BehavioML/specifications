description: |
  The client starts a QUIC connection, performs the handshake, and reaches the connected lifecycle state.

roles:
  primary: client
  participants:
    - server

steps:
  - from: client
    to: server
    capability: connection/send_initial
    label: Initial packet
  - from: client
    to: server
    capability: connection/perform_handshake
    label: Handshake exchange
