description: |
  The server receives the client's initial connection attempt and completes the handshake.

roles:
  primary: server
  participants:
    - client

steps:
  - from: client
    to: server
    capability: connection/receive_initial
    label: Initial packet
  - from: server
    to: client
    capability: connection/perform_handshake
    label: Handshake exchange
